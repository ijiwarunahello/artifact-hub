name = "artifact-hub"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "./dist/web"

[[kv_namespaces]]
binding = "ARTIFACT_KV"
id = "PLACEHOLDER_KV_ID"

[[r2_buckets]]
binding = "ARTIFACT_R2"
bucket_name = "artifact-hub"

[vars]
PUBLIC_BASE_URL = "https://artifact-hub.PLACEHOLDER.workers.dev"
