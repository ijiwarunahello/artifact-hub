<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Artifact Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
<header class="topbar">
  <a class="brand" id="brand" href="/">artifact hub</a>
  <div class="status" id="status">connecting…</div>
</header>
<main class="layout mobile-list" id="layout">
  <aside class="sidebar">
    <div class="controls">
      <input type="search" id="search" placeholder="search…" autocomplete="off" />
      <select id="kind">
        <option value="">all kinds</option>
        <option value="html">html</option>
        <option value="markdown">markdown</option>
        <option value="code">code</option>
        <option value="svg">svg</option>
        <option value="mermaid">mermaid</option>
      </select>
    </div>
    <ul id="list" class="list"></ul>
  </aside>
  <section class="preview">
    <div class="preview-header">
      <button class="back-button" id="back-to-list" type="button">&lt; list</button>
      <div class="preview-title" id="preview-header"></div>
    </div>
    <div class="preview-empty" id="preview-empty">
      <div class="top-content">
        <section class="hero">
          <h1>artifact hub</h1>
          <p>Local artifact server for AI agents</p>
        </section>
        <section class="stats">
          <div class="stats-total">
            <span id="stats-total">--</span>
            <span class="stats-label">artifacts</span>
          </div>
          <div class="stats-rows" id="stats-bars"></div>
        </section>
        <section class="recent">
          <h2 class="section-title">recent</h2>
          <ul class="recent-list" id="recent-list"></ul>
        </section>
        <nav class="top-links">
          <a href="/t/stl"><span class="glyph">&gt;</span> stl viewer</a>
        </nav>
      </div>
    </div>
    <iframe id="frame" class="frame" title="artifact preview" hidden></iframe>
  </section>
</main>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
